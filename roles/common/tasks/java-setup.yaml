- name: installing maven and sql
  ansible.builtin.dnf:
    name: "{{item}}"
    state: present
  loop:
    - maven
    - mysql
  
- name : dependecies installing
  ansible.builtin.command: mvn clean package
  args:
    chdir: /app

- name: dependecies installing
  ansible.builtin.command: mv target/shipping-1.0.jar shipping.jar
  args:
    chdir: /app