
- name : install  mysql
  ansible.builtin.dnf: 
    name: mysql-server
    state: present

- name : enble and start the sql
  ansible.builtin.service:
    name: mysqld
    enabled: yes
    state: started
- name : set up root password
  ansible.builtin.command: mysql_secure_installation --set-root-pass "{{ MYSQL_ROOT_PASSWORD }}"
